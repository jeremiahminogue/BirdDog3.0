# fly.toml — BirdDog 2.0 (pe-mgmt-dev)
# Deploy with: fly deploy

app = 'pe-mgmt-dev'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'pe_data_dev'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true

[[vm]]
  memory = '1gb'
  cpus = 1
